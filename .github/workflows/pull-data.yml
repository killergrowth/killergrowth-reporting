name: Pull Reporting Data

on:
  # Run every hour (public repo = free GitHub Actions minutes)
  schedule:
    - cron: '0 * * * *'

  # Also allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      client:
        description: 'Client slug (e.g. killergrowth). Leave blank for all.'
        required: false
        default: ''

# Prevent concurrent runs — if a new push triggers while a run is in progress, cancel the older one
concurrency:
  group: pull-and-deploy
  cancel-in-progress: true

jobs:
  pull-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Pull data — KillerGrowth
        if: ${{ github.event.inputs.client == '' || github.event.inputs.client == 'killergrowth' }}
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GBP_REFRESH_TOKEN:           ${{ secrets.GBP_REFRESH_TOKEN }}
          GBP_CLIENT_ID:               ${{ secrets.GBP_CLIENT_ID }}
          GBP_CLIENT_SECRET:           ${{ secrets.GBP_CLIENT_SECRET }}
          META_SYSTEM_TOKEN:           ${{ secrets.META_SYSTEM_TOKEN }}
          GHL_API_KEY:                 ${{ secrets.GHL_API_KEY }}
          DATAFORSEO_LOGIN:            ${{ secrets.DATAFORSEO_LOGIN }}
          DATAFORSEO_PASSWORD:         ${{ secrets.DATAFORSEO_PASSWORD }}
        run: node scripts/build-report.js killergrowth

      - name: Pull data — StewardRight
        if: ${{ github.event.inputs.client == '' || github.event.inputs.client == 'stewardright' }}
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          META_SYSTEM_TOKEN:           ${{ secrets.META_SYSTEM_TOKEN }}
          GHL_API_KEY:                 ${{ secrets.GHL_API_KEY }}
        run: node scripts/build-report.js stewardright

      - name: Pull data — Sunflower Plumbing
        if: ${{ github.event.inputs.client == '' || github.event.inputs.client == 'sunflower' }}
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON:    ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          META_SYSTEM_TOKEN:              ${{ secrets.META_SYSTEM_TOKEN }}
          GHL_API_KEY:                    ${{ secrets.GHL_API_KEY }}
          GOOGLE_ADS_CLIENT_ID:           ${{ secrets.GOOGLE_ADS_CLIENT_ID }}
          GOOGLE_ADS_CLIENT_SECRET:       ${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}
          GOOGLE_ADS_REFRESH_TOKEN:       ${{ secrets.GOOGLE_ADS_REFRESH_TOKEN }}
          GOOGLE_ADS_DEVELOPER_TOKEN:     ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
          GOOGLE_ADS_LOGIN_CUSTOMER_ID:   ${{ secrets.GOOGLE_ADS_LOGIN_CUSTOMER_ID }}
        run: node scripts/build-report.js sunflower

      - name: Pull data — Don's Heating & Air
        if: ${{ github.event.inputs.client == '' || github.event.inputs.client == 'dons-heating' }}
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          META_SYSTEM_TOKEN:           ${{ secrets.META_SYSTEM_TOKEN }}
          GHL_API_KEY:                 ${{ secrets.GHL_API_KEY }}
        run: node scripts/build-report.js dons-heating

      # Add a step like the one above for each new client.
      # Copy the step, change the client slug and the if condition.

      - name: Build site
        run: node build.js

      - name: Commit updated data files
        run: |
          git config user.name  "KillerGrowth Bot"
          git config user.email "notifications@killergrowth.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: auto-pull reporting data $(date +'%Y-%m')"
          git push

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN:   ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID:  ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy ./dist --project-name killergrowth-reporting --branch main --commit-dirty=true
